services:
  - type: web
    name: teamsync-backend
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JWT_SECRET
        value: teamsync_super_secret_jwt_key_2024
      - key: DATABASE_URL
        fromDatabase:
          name: teamsync-db
          property: connectionString
