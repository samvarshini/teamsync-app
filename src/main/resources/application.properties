# Database - Railway provides these automatically
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/teamsync}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:teamsync_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:teamsync123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=${PORT:8080}

# JWT
app.jwt.secret=${JWT_SECRET:teamsync_super_secret_jwt_key_2024}
app.jwt.expiration=86400000