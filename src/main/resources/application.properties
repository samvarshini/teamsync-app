# Database - uses Railway DATABASE_URL in production, local in dev
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/teamsync}
spring.datasource.username=${PGUSER:teamsync_user}
spring.datasource.password=${PGPASSWORD:teamsync123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=${PORT:8080}

# JWT
app.jwt.secret=${JWT_SECRET:teamsync_super_secret_jwt_key_2024}
app.jwt.expiration=86400000